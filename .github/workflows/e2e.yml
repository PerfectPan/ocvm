name: E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/e2e.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "src/**"
      - "scripts/e2e-docker.sh"
      - "scripts/e2e-npm-openclaw.sh"
      - "tests/e2e/**"

jobs:
  npm-openclaw:
    name: npm openclaw install in Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/e2e-docker.sh

